[metadata]
name = "meteorite_collection_t1"
description = "Find Antarctic meteorites from a list, process them (analyze/classify/appraise/photograph), and selectively display qualifying ones in the Vault Collection."
tier = 1
parent = "meteorite_collection_t0"
difficulty_methods = ["ambiguity_resolution", "conditional_rules", "tool_proliferation"]

[[metadata.pass_rates]]
solver = "local"
model = "openai/gpt-5-mini"
k = 20
value = 1.0

[[metadata.pass_rates]]
solver = "rlm"
model = "zai-org/GLM-5.1-FP8"
k = 50
value = 0.98
